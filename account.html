    <script>
      const darkModeToggle = document.getElementById("darkModeToggle");
      const darkModeIcon = document.getElementById("darkModeIcon");
      const html = document.documentElement;

      const currentMode = localStorage.getItem("darkMode") || "light";

      if (currentMode === "dark") {
        html.classList.add("dark");
        darkModeIcon.textContent = "☀️";
      } else {
        html.classList.remove("dark");
        darkModeIcon.textContent = "🌙";
      }

      darkModeToggle.addEventListener("click", () => {
        html.classList.toggle("dark");

       
        if (html.classList.contains("dark")) {
          darkModeIcon.textContent = "☀️";
          localStorage.setItem("darkMode", "dark");
        } else {
          darkModeIcon.textContent = "🌙";
          localStorage.setItem("darkMode", "light");
        }
      });

      
      document.querySelector('form').addEventListener('submit', function(e) {
       
        const checkedLanguages = document.querySelectorAll('input[name="programmingLanguages[]"]:checked');
        
       
        const selectedLanguages = Array.from(checkedLanguages).map(checkbox => checkbox.value);
        
        
        checkedLanguages.forEach(checkbox => checkbox.disabled = true);
        
        
        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.name = 'programmingLanguages';
        hiddenInput.value = selectedLanguages.length > 0 ? selectedLanguages.join(', ') : 'None selected';
        
        
        this.appendChild(hiddenInput);
      });
    </script>
